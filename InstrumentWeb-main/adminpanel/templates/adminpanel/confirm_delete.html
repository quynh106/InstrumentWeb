{% extends "adminpanel/base_admin.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow mb-4 border-danger">
            <div class="card-header py-3 bg-danger text-white">
                <h6 class="m-0 fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> Xác nhận Xóa</h6>
            </div>
            <div class="card-body">
                <p>Bạn có chắc chắn muốn **xóa** đối tượng sau:</p>
                <h5 class="text-danger">{{ item.name|default:item.username|default:"Mục này" }}</h5>
                <p class="text-danger">Hành động này không thể hoàn tác.</p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2"><i class="bi bi-trash"></i> Xóa vĩnh viễn</button>
                    <a href="javascript:history.back()" class="btn btn-secondary">Hủy</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
