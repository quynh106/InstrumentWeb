{% extends "adminpanel/base_admin.html" %}

{% block content %}
<div class="d-sm-flex align-items-center justify-content-between mb-4">
    <h1 class="h3 mb-0 text-gray-800"><i class="bi bi-tag-fill"></i> {{ title }}</h1>
</div>

<div class="card shadow mb-4">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <div class="text-danger small">{{ field.errors.as_text }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary me-2">Lưu Danh mục</button>
            <a href="{% url 'adminpanel:category_list' %}" class="btn btn-secondary">Hủy</a>
        </form>
    </div>
</div>
{% endblock content %}
