
{% extends "base.html" %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-3">{% include "adminpanel/sidebar.html" %}</div>
        <div class="col-md-9">
            <h2>{{ title }}</h2>
            <form method="post" enctype="multipart/form-data" class="mt-3">
                {% csrf_token %}
                <div class="alert alert-warning">
                    Chưa có Form Django. Vui lòng hiển thị `{{ form.as_p }}` hoặc các trường Form thủ công tại đây.
                </div>
                <div class="mb-3">
                    <label class="form-label">Tên Sản phẩm:</label>
                    <input type="text" name="name" class="form-control" value="{{ instance.name|default:'' }}" required>
                </div>
                <div class="d-flex justify-content-end">
                    <a href="{% url 'adminpanel:product_list' %}" class="btn btn-secondary me-2">Hủy</a>
                    <button type="submit" class="btn btn-primary">Lưu</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
